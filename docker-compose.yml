version: '3.8'

services:
  # PostgreSQL 数据库服务
  db:
    image: postgres:16-alpine
    container_name: tutorial_db
    environment:
      POSTGRES_DB: tutorial_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tutorial_network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutorial_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/tutorial_db
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=tutorial_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - tutorial_network
    restart: unless-stopped

  # 前端服务（开发模式）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: tutorial_frontend
    environment:
      - VITE_API_URL=http://localhost:8000
      - NODE_ENV=development
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - tutorial_network
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped

# 数据卷
volumes:
  postgres_data:
    name: tutorial_postgres_data

# 网络配置
networks:
  tutorial_network:
    name: tutorial_network
    driver: bridge
