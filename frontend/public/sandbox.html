<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'none';
        script-src 'unsafe-inline';
        style-src 'unsafe-inline';
        img-src data: blob:;
        connect-src 'none';
        font-src 'none';
        object-src 'none';
        media-src 'none';
        frame-src 'none';
    ">
    <title>Simulation Sandbox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        #container { width: 100%; min-height: 100vh; }
        .error-message {
            padding: 20px;
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
            margin: 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <script>
        // 安全日志记录（发送到父窗口）
        function log(level, message) {
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'SANDBOX_LOG',
                    level: level,
                    message: message,
                    timestamp: Date.now()
                }, '*');
            }
        }

        // 拦截危险操作
        // 1. 阻止 window.open
        window.open = function() {
            log('warn', 'Blocked window.open() call');
            return null;
        };

        // 2. 阻止 location 跳转
        Object.defineProperty(window, 'location', {
            get: function() { return { href: '#' }; },
            set: function() { log('warn', 'Blocked location change'); }
        });

        // 3. 阻止 fetch 和 XMLHttpRequest
        window.fetch = function() {
            log('warn', 'Blocked fetch() call');
            return Promise.reject(new Error('Network requests are disabled in sandbox'));
        };

        window.XMLHttpRequest = function() {
            log('warn', 'Blocked XMLHttpRequest creation');
            throw new Error('XMLHttpRequest is disabled in sandbox');
        };

        // 4. 阻止 WebSocket
        window.WebSocket = function() {
            log('warn', 'Blocked WebSocket creation');
            throw new Error('WebSocket is disabled in sandbox');
        };

        // 5. 阻止 localStorage 和 sessionStorage
        Object.defineProperty(window, 'localStorage', {
            get: function() {
                log('warn', 'Blocked localStorage access');
                return null;
            }
        });
        Object.defineProperty(window, 'sessionStorage', {
            get: function() {
                log('warn', 'Blocked sessionStorage access');
                return null;
            }
        });

        // 6. 阻止 document.cookie
        Object.defineProperty(document, 'cookie', {
            get: function() {
                log('warn', 'Blocked cookie read');
                return '';
            },
            set: function() {
                log('warn', 'Blocked cookie write');
            }
        });

        // 7. 阻止 eval 和 new Function
        window.eval = function() {
            log('error', 'Blocked eval() call');
            throw new Error('eval() is disabled in sandbox');
        };
        window.Function = function() {
            log('error', 'Blocked new Function() call');
            throw new Error('Function constructor is disabled in sandbox');
        };

        // 8. 阻止 alert/confirm/prompt（影响用户体验）
        window.alert = function(msg) { log('info', 'Alert: ' + msg); };
        window.confirm = function() { log('info', 'Blocked confirm'); return false; };
        window.prompt = function() { log('info', 'Blocked prompt'); return null; };

        // 监听来自父窗口的消息
        window.addEventListener('message', function(event) {
            // 安全检查：验证消息来源（可选，根据部署情况调整）
            // if (event.origin !== 'expected-origin') return;

            const data = event.data;
            if (!data || typeof data !== 'object') return;

            switch (data.type) {
                case 'LOAD_SIMULATION':
                    loadSimulation(data.code);
                    break;
                case 'RESET_SANDBOX':
                    resetSandbox();
                    break;
                case 'PING':
                    event.source.postMessage({ type: 'PONG' }, event.origin);
                    break;
            }
        });

        // 加载仿真代码
        function loadSimulation(htmlCode) {
            log('info', 'Loading simulation...');
            
            const container = document.getElementById('container');
            if (!container) {
                log('error', 'Container not found');
                return;
            }

            try {
                // 清理之前的内容
                container.innerHTML = '';

                // 验证代码基本结构
                if (!htmlCode || typeof htmlCode !== 'string') {
                    throw new Error('Invalid simulation code');
                }

                // 检查是否包含 simulation-container
                if (!htmlCode.includes('simulation-container')) {
                    log('warn', 'Code does not contain simulation-container class');
                }

                // 注入代码
                container.innerHTML = htmlCode;

                // 执行脚本（手动执行，因为 innerHTML 不会执行 script）
                executeScripts(container);

                log('info', 'Simulation loaded successfully');

                // 通知父窗口加载完成
                if (window.parent !== window) {
                    window.parent.postMessage({
                        type: 'SIMULATION_LOADED',
                        timestamp: Date.now()
                    }, '*');
                }
            } catch (error) {
                log('error', 'Failed to load simulation: ' + error.message);
                container.innerHTML = '<div class="error-message">仿真加载失败: ' + escapeHtml(error.message) + '</div>';
                
                if (window.parent !== window) {
                    window.parent.postMessage({
                        type: 'SIMULATION_ERROR',
                        error: error.message,
                        timestamp: Date.now()
                    }, '*');
                }
            }
        }

        // 执行容器内的脚本
        function executeScripts(container) {
            const scripts = container.querySelectorAll('script');
            scripts.forEach(function(oldScript) {
                const newScript = document.createElement('script');
                
                // 复制属性
                Array.from(oldScript.attributes).forEach(function(attr) {
                    newScript.setAttribute(attr.name, attr.value);
                });
                
                // 复制代码
                newScript.textContent = oldScript.textContent;
                
                // 替换执行
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }

        // 重置沙箱
        function resetSandbox() {
            const container = document.getElementById('container');
            if (container) {
                container.innerHTML = '';
            }
            log('info', 'Sandbox reset');
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 通知父窗口沙箱已就绪
        if (window.parent !== window) {
            window.parent.postMessage({
                type: 'SANDBOX_READY',
                timestamp: Date.now()
            }, '*');
        }

        log('info', 'Sandbox initialized');
    </script>
</body>
</html>
